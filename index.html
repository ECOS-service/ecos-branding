<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECOS | Visión, Impacto, Permanencia</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --bg-card: #0a0a0a;
            --accent: #fb9132; /* Tu color coral/naranja de ECOS */
            --text: #ffffff;
            --text-dim: #a0a0a0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg); color: var(--text); line-height: 1.6; overflow-x: hidden; }

        /* Navegación */
        nav {
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            width: 100%;
            z-index: 1000;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
        }
        .nav-logo { height: 30px; }
        .nav-links a { color: var(--text); text-decoration: none; margin-left: 30px; font-size: 0.9rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }

        /* Hero Section */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            padding: 0 5%;
        }
        .hero-logo { width: 300px; max-width: 80%; margin-bottom: 30px; }
        .hero h1 { font-weight: 900; letter-spacing: 5px; color: var(--text-dim); font-size: 1rem; margin-bottom: 40px; }
        .btn-main {
            background: var(--accent);
            color: white;
            padding: 15px 40px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: 700;
            text-transform: uppercase;
            transition: 0.3s;
        }
        .btn-main:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(251, 145, 50, 0.4); }

        /* Bento Grid Portafolio */
        .portfolio { padding: 100px 5%; }
        .section-title { text-align: center; margin-bottom: 60px; }
        .section-title h2 { font-size: 2.5rem; margin-bottom: 10px; }
        
        .bento-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 250px);
            gap: 15px;
        }
        .bento-item { 
            position: relative; 
            border-radius: 15px; 
            overflow: hidden; 
            background: var(--bg-card); 
            border: 1px solid rgba(255,255,255,0.05);
        }
        .bento-item img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .bento-item:hover img { transform: scale(1.05); }

        /* Clases para variar tamaños */
        .span-2-2 { grid-column: span 2; grid-row: span 2; }
        .span-2-1 { grid-column: span 2; }

        /* Trayectoria Section */
        .about { padding: 100px 10%; display: grid; grid-template-columns: 1fr 1fr; gap: 50px; align-items: center; background: #050505; }
        .about-img { width: 100%; border-radius: 20px; }
        .about h2 { font-size: 2.5rem; margin-bottom: 20px; }
        .about h2 span { color: var(--accent); }

        /* Formulario */
        .contact { padding: 100px 10%; text-align: center; }
        .contact-box { background: var(--bg-card); padding: 50px; border-radius: 20px; max-width: 600px; margin: 0 auto; }
        input, select, textarea { 
            width: 100%; padding: 15px; margin-bottom: 20px; 
            background: #151515; border: 1px solid #333; color: white; border-radius: 5px;
        }
        
        footer { padding: 40px; text-align: center; color: var(--text-dim); font-size: 0.8rem; border-top: 1px solid #111; }

        @media (max-width: 768px) {
            .bento-grid { grid-template-columns: 1fr; grid-template-rows: auto; }
            .span-2-2, .span-2-1 { grid-column: span 1; grid-row: span 1; height: 300px; }
